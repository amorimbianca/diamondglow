<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diamond Glow</title>

  <!-- Bootstrat Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="css/estilo.css">

</head>

<body>
  <!-- ALT+SHFT+A -->

  <!-- Cabeçalho -->
  <header>

    <!-- Logo -->
    <div class="header-logo">
      <a href="#home">
        <img src="imagem/logo-png.png" alt="" class="logo">
      </a>
    </div>

    <!-- Menu Desktop / PC -->
    <nav class="menu-desktop">
      <ul class="menu">
        <li>
          <a href="#home" class="menu-link active">
            <span class="menu-texto"> Home </span>
          </a>
        </li>

        <li>
          <a href="#produto" class="menu-link">
            <span class="menu-texto"> Produto </span>
          </a>
        </li>

        <li>
          <a href="#contato" class="menu-link">
            <span class="menu-texto"> Contato </span>
          </a>
        </li>

        <li>
          <a href="#sobre-nos" class="menu-link">
            <span class="menu-texto"> Sobre Nós </span>
          </a>
        </li>

      </ul>
    </nav>

    <!-- Icone trocar cor tema  -->
    <div class="header-toggle">

      <!-- Icone Sol ou Lua -->
      <i class="bi bi-sun" id="toggleTheme"></i>

      <!-- Botão Hamburger -->
      <button class="btn-menu-mobile" id="menuHamburger">
        <i class="bi bi-list-stars"></i>
      </button>

    </div>

  </header>
</body>

</html>
